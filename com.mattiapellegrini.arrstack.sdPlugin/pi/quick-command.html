<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Quick Command</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <form>
    <div class="section-title">Connection</div>
    <div class="field-group">
      <label for="serviceId">Service</label>
      <select id="serviceId">
        <option value="sonarr">Sonarr</option>
        <option value="radarr">Radarr</option>
        <option value="lidarr">Lidarr</option>
        <option value="readarr">Readarr</option>
        <option value="prowlarr">Prowlarr</option>
        <option value="bazarr">Bazarr</option>
      </select>
    </div>
    <div class="field-group">
      <label for="baseUrl">Server URL</label>
      <input id="baseUrl" type="url" placeholder="http://localhost:8989">
    </div>
    <div class="field-group">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="X-Api-Key">
    </div>
    <div class="section-title">Command</div>
    <div class="field-group">
      <label for="commandType">Command Type</label>
      <select id="commandType">
        <option value="generic">Service command</option>
        <option value="custom">Custom command name</option>
      </select>
    </div>
    <div class="field-group">
      <label for="genericCommand">Command</label>
      <select id="genericCommand">
        <option value="searchMissing">Search Missing</option>
        <option value="refresh">Refresh</option>
        <option value="rssSync">RSS Sync</option>
        <option value="backup">Backup</option>
      </select>
    </div>
    <div class="field-group">
      <label for="customCommand">Custom Command Name</label>
      <input id="customCommand" type="text" placeholder="e.g. DownloadedEpisodesScan">
    </div>
    <div class="checkbox-row">
      <input id="requireConfirmation" type="checkbox" checked>
      <label for="requireConfirmation">Require confirmation before executing</label>
    </div>
    <div id="message"></div>
  </form>
  <script src="shared.js"></script>
  <script>
    setupAutoSave();

    document.getElementById('commandType').addEventListener('change', () => {
      const isCustom = document.getElementById('commandType').value === 'custom';
      document.getElementById('genericCommand').style.display = isCustom ? 'none' : 'block';
      document.getElementById('customCommand').style.display = isCustom ? 'block' : 'none';
    });
    document.getElementById('commandType').dispatchEvent(new Event('change'));
  </script>
</body>
</html>
