<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>System Status</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <form>
    <div class="section-title">Connection</div>
    <div class="field-group">
      <label for="serviceId">Service</label>
      <select id="serviceId">
        <option value="sonarr">Sonarr</option>
        <option value="radarr">Radarr</option>
        <option value="lidarr">Lidarr</option>
        <option value="readarr">Readarr</option>
        <option value="prowlarr">Prowlarr</option>
        <option value="bazarr">Bazarr</option>
      </select>
    </div>
    <div class="field-group">
      <label for="baseUrl">Server URL</label>
      <input id="baseUrl" type="url" placeholder="http://localhost:8989">
    </div>
    <div class="field-group">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" placeholder="X-Api-Key">
    </div>
    <div class="section-title">Display</div>
    <div class="field-group">
      <label for="refreshInterval">Refresh Interval (seconds)</label>
      <input id="refreshInterval" type="number" min="5" max="3600" value="60">
    </div>
    <div class="checkbox-row">
      <input id="showVersion" type="checkbox" checked>
      <label for="showVersion">Show version on button</label>
    </div>
    <div class="section-title">Global Settings</div>
    <div class="checkbox-row">
      <input id="useGlobal" type="checkbox">
      <label for="useGlobal">Use global connection settings</label>
    </div>
    <div style="font-size:11px;color:#666;margin-bottom:12px;" id="_globalIndicator">Global: not set</div>
    <div id="message"></div>
    <button type="button" id="testBtn" class="secondary">Test Connection</button>
  </form>
  <script src="shared.js"></script>
  <script>
    setupAutoSave();
    toggleConnectionFields();

    document.getElementById('testBtn').addEventListener('click', async () => {
      const settings = collectSettings();
      if (!settings.baseUrl || !settings.apiKey) {
        showMessage('Fill in URL and API key first', 'error');
        return;
      }
      showMessage('Testing...', 'info');
      try {
        const resp = await fetch(settings.baseUrl.replace(/\/+$/, '') + '/api/v3/system/status', {
          headers: { 'X-Api-Key': settings.apiKey }
        });
        if (resp.ok) {
          const data = await resp.json();
          showMessage('Connected: ' + (data.version || 'ok'), 'success');
        } else {
          showMessage('HTTP ' + resp.status + ': ' + resp.statusText, 'error');
        }
      } catch (err) {
        showMessage('Connection failed: ' + err.message, 'error');
      }
    });
  </script>
</body>
</html>
